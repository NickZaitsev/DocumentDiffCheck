<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Comparison Report · Document Diff Check</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand report-brand" href="/">
          <div class="brand-text">
            <strong>Docreview</strong>
          </div>
        </a>
        <nav id="primaryNav" class="topnav" aria-label="Основная навигация">
          <a href="/">Сравнить документы</a>
          <a href="/review.html">Ревью документа</a>
          <a href="/history.html">История</a>
          <a href="/documents.html">Документы</a>
        </nav>
        <button class="icon-btn nav-toggle" type="button" aria-label="Открыть меню" aria-expanded="false" aria-controls="primaryNav" data-nav-toggle>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 6h16" />
            <path d="M4 12h16" />
            <path d="M4 18h16" />
          </svg>
        </button>
      </div>
    </header>

    <main class="app">
      <section id="reportStatus" class="loading-card">
        <span class="spinner spinner-lg"></span>
        <p>Загружаю отчет…</p>
      </section>

      <section id="reportView" class="results" hidden>
        <div class="results-head">
          <div class="report-title-row">
            <div>
              <h1 id="reportTitle">Отчет сравнения</h1>
              <p id="reportDate" class="report-date"></p>
            </div>
            <button id="shareReport" class="btn-mini" type="button">Поделиться</button>
          </div>
          <div id="resultsMeta" class="results-meta"></div>
          <div id="stats" class="stats"></div>
        </div>

        <nav class="tabs" role="tablist">
          <button class="tab is-active" type="button" data-tab="summary">Правки</button>
          <button class="tab" type="button" data-tab="risks">
            Финансовые риски <span id="riskCount" class="tab-count" hidden></span>
          </button>
          <button class="tab" type="button" data-tab="changes">
            Diffs <span id="changeCount" class="tab-count" hidden></span>
          </button>
        </nav>

        <div class="tab-panels">
          <div id="panel-summary" class="tab-panel is-active" data-panel="summary"></div>
          <div id="panel-risks" class="tab-panel" data-panel="risks"></div>
          <div id="panel-changes" class="tab-panel" data-panel="changes"></div>
        </div>
      </section>
    </main>

    <div id="toasts" class="toasts" aria-live="polite"></div>
    <script src="/nav.js"></script>
    <script src="/report.js"></script>
  </body>
</html>
