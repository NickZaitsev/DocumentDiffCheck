<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>История · Docreview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand report-brand" href="/">
          <div class="brand-text"><strong>Docreview</strong></div>
        </a>
        <button class="icon-btn nav-toggle" type="button" aria-label="Открыть меню" aria-expanded="false" aria-controls="primaryNav" data-nav-toggle>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 6h16" />
            <path d="M4 12h16" />
            <path d="M4 18h16" />
          </svg>
        </button>
        <div id="primaryNav" class="topbar-menu">
          <nav class="topnav" aria-label="Основная навигация">
            <a href="/">Сравнить документы</a>
            <a href="/review.html">Ревью документа</a>
            <a href="/history.html">История</a>
            <a href="/documents.html">Документы</a>
          </nav>
          <button id="themeToggle" class="icon-btn theme-toggle" type="button" title="Сменить тему" aria-label="Сменить тему">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
            </svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="app">
      <section class="hero page-hero">
        <h1>История</h1>
        <p>Здесь собраны сравнения и ревью документов. Поиск работает по названию, ID и типу записи.</p>
      </section>

      <section class="card history-card">
        <div class="card-head">
          <h2>История документов</h2>
          <button id="refreshReports" class="link-btn" type="button">Обновить</button>
        </div>
        <div class="history-toolbar">
          <div class="history-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="M21 21l-4.35-4.35"></path>
            </svg>
            <input
              id="historySearch"
              type="search"
              autocomplete="off"
              placeholder="Поиск по истории"
              aria-label="Поиск по истории"
            />
          </div>
          <div class="history-filters" role="tablist" aria-label="Фильтр истории">
            <button class="history-filter is-active" type="button" data-filter="all">Все <span id="historyCountAll" class="tab-count" hidden></span></button>
            <button class="history-filter" type="button" data-filter="reports">Сравнения <span id="historyCountReports" class="tab-count" hidden></span></button>
            <button class="history-filter" type="button" data-filter="reviews">Ревью <span id="historyCountReviews" class="tab-count" hidden></span></button>
          </div>
        </div>
        <div id="reports" class="reports-list empty">
          <p class="empty-note">Пока истории нет.</p>
        </div>
      </section>
    </main>

    <div id="toasts" class="toasts" aria-live="polite"></div>
    <script src="/nav.js"></script>
    <script src="/history.js"></script>
  </body>
</html>
